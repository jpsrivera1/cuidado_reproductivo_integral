<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Logo Cuidado Reproductivo Integral">
  <defs>
    <linearGradient id="lgMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f49abc"/>
      <stop offset="50%" stop-color="#b78bd6"/>
      <stop offset="100%" stop-color="#9ec9ed"/>
    </linearGradient>
    <linearGradient id="lgMenta" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8fd6c8"/>
      <stop offset="100%" stop-color="#9ec9ed"/>
    </linearGradient>
  </defs>

  <!-- Círculo exterior -->
  <circle cx="60" cy="60" r="56" fill="white" stroke="url(#lgMain)" stroke-width="3"/>
  <circle cx="60" cy="60" r="50" fill="none" stroke="url(#lgMain)" stroke-width="1" opacity="0.3"/>

  <!-- Corazón principal -->
  <path d="M60 86 C60 86 28 64 28 44 Q28 30 40 30 Q50 30 60 42 Q70 30 80 30 Q92 30 92 44 Q92 64 60 86Z"
        fill="url(#lgMain)" opacity="0.92"/>

  <!-- Cruz médica sobre el corazón -->
  <rect x="55" y="38" width="10" height="30" rx="4" fill="white" opacity="0.9"/>
  <rect x="43" y="50" width="34" height="10" rx="4" fill="white" opacity="0.9"/>

  <!-- Hoja/planta (elemento naturaleza) -->
  <ellipse cx="88" cy="26" rx="8" ry="14" fill="url(#lgMenta)"
           transform="rotate(-35 88 26)" opacity="0.85"/>
  <line x1="80" y1="34" x2="88" y2="26" stroke="#5bbcaa" stroke-width="2"
        stroke-linecap="round"/>

  <!-- Pequeños puntos decorativos -->
  <circle cx="26" cy="72" r="3" fill="#f4b49c" opacity="0.7"/>
  <circle cx="20" cy="60" r="2" fill="#b78bd6" opacity="0.5"/>
  <circle cx="100" cy="72" r="3" fill="#9ec9ed" opacity="0.7"/>
</svg>
